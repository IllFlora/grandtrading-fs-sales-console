<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#102A43"><title>Grand Trading FS Console</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="admin.css?v=20260711-5"><link rel="stylesheet" href="quick-report.css?v=20260712-4"></head><body>
<div id="login" class="login"><div class="login-card"><div class="brand-mark">GT</div><p class="eyebrow">GRAND TRADING</p><h1>FS Sales Console</h1><button id="loginBtn" class="primary">Googleアカウントでログイン</button><small>管理者が登録したFS用Googleアカウントでログインしてください</small><div id="loginError" class="error"></div></div></div>
<div id="app" class="app hidden"><aside><div class="brand"><span>GT</span><div><b>Grand Trading</b><small>FS SALES</small></div></div><nav><button class="nav active" data-view="today">今日の訪問 <i id="todayBadge">0</i></button><button class="nav" data-view="mine">自分の訪問予定</button><button class="nav" data-view="all">行き先を探す</button><button class="nav" data-view="outside">＋ リスト外活動</button><button class="nav" data-view="appointments">商談管理</button><button class="nav" data-view="scoreGuide">スコアの見方</button><button id="adminNav" class="nav hidden" data-view="admin">管理者設定 <i id="deleteBadge" class="hidden">0</i></button></nav><div class="areas"><p>エリア</p><div id="areaNav"></div></div><div class="user"><span id="avatar"></span><div><b id="userName"></b><small id="userEmail"></small></div><button id="logout" title="ログアウト">↗</button></div></aside>
<main><header><div><p id="viewEyebrow" class="eyebrow">TODAY ROUTE</p><h2 id="viewTitle">今日の訪問</h2><p id="viewDesc">訪問順に並べて、現地で結果を登録</p></div><div class="sync"><span id="syncDot"></span><div><b id="syncText">未同期</b><small id="syncTime">—</small></div><button id="refresh" class="icon">↻</button></div></header>
<section class="kpis"><article><span>本日の訪問</span><strong id="kToday">—</strong><small>自分の予定</small></article><article><span>未着手リード</span><strong id="kUntouched">—</strong><small>全エリア</small></article><article><span>訪問済み</span><strong id="kAppointments">—</strong><small>累計</small></article><article><span>商談中</span><strong id="kWon">—</strong><small>現在進行中</small></article></section>
<section id="leadToolbar" class="toolbar"><div class="search"><span>⌕</span><input id="search" placeholder="企業名、住所、電話番号で検索"></div><div class="search area-search"><span>⌖</span><input id="areaSearch" placeholder="市区町村・住所でエリア検索"></div><select id="prefectureFilter"><option value="">全エリア</option></select><select id="statusFilter"><option value="">すべてのステータス</option></select><select id="categoryFilter"><option value="">すべての業種</option></select><select id="scoreFilter"><option value="0">全スコア</option><option value="70">70点以上</option><option value="60">60点以上</option><option value="50">50点以上</option></select><button id="clear" class="ghost">クリア</button></section>
<section class="list-head"><div><b id="resultCount">0件</b><span id="activeLabel"></span></div><select id="sort"><option value="priority">優先順</option><option value="score">スコア順</option><option value="updated">更新順</option></select></section>
<section id="cards" class="cards"></section><section id="specialView" class="special-view hidden"></section><div id="empty" class="empty hidden"><b>該当するリードはありません</b><p>条件を変更して確認してください。</p></div></main>
<nav class="mobile-nav"><button class="active" data-view="today"><span>◷</span>今日</button><button data-view="all"><span>⌕</span>探す</button><button data-view="outside"><span>＋</span>リスト外</button><button data-view="mine"><span>▣</span>予定</button><button data-view="appointments"><span>◎</span>商談</button></nav><div id="drawer" class="drawer hidden"><div class="drawer-mask" data-close></div><section><button class="drawer-close" data-close>×</button><div id="drawerContent"></div></section></div><div id="toast" class="toast hidden"></div></div>
<script src="config.js?v=20260712-4"></script><script src="app.js?v=20260712-6"></script></body></html>
